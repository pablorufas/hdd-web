<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 540px; height: 720px; overflow: hidden;
  background: #0a0a0a; color: #f5f0e8;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex; flex-direction: column;
}
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px 0;
}
.eyebrow { font-size: 11px; letter-spacing: 0.12em; color: #888; text-transform: uppercase; }
.slide-num { font-size: 11px; color: #555; }
.content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 28px; }
.countdown-box {
  background: #a855f7; border-radius: 12px; padding: 16px 22px;
  display: inline-flex; align-items: baseline; gap: 10px;
  margin-bottom: 20px; align-self: flex-start;
}
.countdown-num { font-size: 52px; font-weight: 800; color: #fff; line-height: 1; letter-spacing: -0.04em; }
.countdown-label { font-size: 16px; color: rgba(255,255,255,0.85); font-weight: 600; }
.time-box {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3);
  border-radius: 8px; padding: 8px 14px; margin-bottom: 20px;
}
.time-box span { font-size: 22px; font-weight: 700; color: #a855f7; }
.time-box small { font-size: 12px; color: #888; }
.divider { width: 48px; height: 3px; background: #a855f7; margin-bottom: 18px; }
.headline { font-size: 25px; font-weight: 700; line-height: 1.3; }
.subhead { font-size: 13px; color: #aaa; margin-top: 10px; line-height: 1.55; }
.subhead strong { color: #f5f0e8; }
.bottom-bar {
  padding: 16px 24px; display: flex; justify-content: space-between;
  border-top: 1px solid #1e1e1e;
}
.brand { font-size: 11px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="top-bar">
  <span class="eyebrow">Política · Andalucía</span>
  <span class="slide-num">01 — 04</span>
</div>
<div class="content">
  <div class="countdown-box">
    <div class="countdown-num">6</div>
    <div class="countdown-label">días para votar</div>
  </div>
  <div class="time-box">
    <span>21:45h</span>
    <small>Canal Sur + RTVE La 1</small>
  </div>
  <div class="divider"></div>
  <div class="headline">El debate decisivo de Andalucía: esta noche se decide quién llega al 17 de mayo con ventaja</div>
  <div class="subhead">5 candidatos. 110 minutos. <strong>El PP al límite de la mayoría absoluta</strong> según las últimas encuestas.</div>
</div>
<div class="bottom-bar">
  <span class="brand">horadedespertar.org</span>
  <span style="font-size:11px;color:#555;">11·05·26</span>
</div>
</body>
</html>
