<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 540px; height: 720px; overflow: hidden;
  background: #0a0a0a; color: #f5f0e8;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex; flex-direction: column; position: relative;
}
.bg {
  position: absolute; inset: 0;
  background-image: url('https://images.unsplash.com/photo-1612043273531-601d2cd4855e?w=1080&q=80&fit=crop&auto=format');
  background-size: cover; background-position: center;
  filter: blur(7px) brightness(0.2);
  transform: scale(1.08); z-index: 0;
}
.top-bar, .content, .bottom-bar { position: relative; z-index: 1; }
.top-bar { display: flex; justify-content: space-between; padding: 20px 24px 0; }
.eyebrow { font-size: 11px; letter-spacing: 0.12em; color: #aaa; text-transform: uppercase; }
.slide-num { font-size: 11px; color: #666; }
.content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 28px; }
.big-stat { font-size: 100px; font-weight: 800; line-height: 1; letter-spacing: -0.05em; color: #22c55e; }
.big-pct { font-size: 52px; letter-spacing: -0.03em; }
.stat-line { font-size: 16px; color: #888; margin-top: 4px; margin-bottom: 20px; }
.divider { width: 48px; height: 3px; background: #22c55e; margin-bottom: 18px; }
.headline { font-size: 24px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
.subhead { font-size: 14px; color: #aaa; line-height: 1.5; }
.subhead strong { color: #f5f0e8; }
.bottom-bar {
  padding: 14px 24px; display: flex; justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,0.06);
  background: rgba(10,10,10,0.5);
}
.brand { font-size: 11px; color: #666; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="top-bar">
  <span class="eyebrow">Economía · España</span>
  <span class="slide-num">01 — 04</span>
</div>
<div class="content">
  <div class="big-stat">46<span class="big-pct">%</span></div>
  <div class="stat-line">de los jóvenes de 18-24 invierte en bolsa y ETFs</div>
  <div class="divider"></div>
  <div class="headline">La Generación Z abandona el ladrillo porque no puede comprarlo</div>
  <div class="subhead">Solo el <strong>18%</strong> elige la vivienda como activo de inversión. El número de inversores menores de 24 años <strong>se ha duplicado en 2 años</strong>.</div>
</div>
<div class="bottom-bar">
  <span class="brand">horadedespertar.org</span>
  <span style="font-size:11px;color:#666;">07·05·26</span>
</div>
</body>
</html>
