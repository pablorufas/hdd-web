<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 540px; height: 720px; overflow: hidden;
  background: #0a0a0a; color: #f5f0e8;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex; flex-direction: column; position: relative;
}
.bg {
  position: absolute; inset: 0;
  background-image: url('https://images.unsplash.com/photo-1750872310330-80191a871b36?w=1080&q=80&fit=crop&auto=format');
  background-size: cover; background-position: center;
  filter: blur(6px) brightness(0.2);
  transform: scale(1.08); z-index: 0;
}
.top-bar, .content, .bottom-bar { position: relative; z-index: 1; }
.top-bar { display: flex; justify-content: space-between; padding: 20px 24px 0; }
.eyebrow { font-size: 11px; letter-spacing: 0.12em; color: #aaa; text-transform: uppercase; }
.slide-num { font-size: 11px; color: #666; }
.content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 28px; }
.live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(129,140,248,0.12); border: 1px solid rgba(129,140,248,0.35);
  border-radius: 20px; padding: 5px 12px; margin-bottom: 14px; width: fit-content;
}
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #818cf8; animation: none; }
.live-text { font-size: 11px; color: #818cf8; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
.headline-big { font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; color: #f5f0e8; }
.headline-big span { color: #818cf8; }
.sub-line { font-size: 14px; color: #888; margin-bottom: 18px; }
.divider { width: 48px; height: 3px; background: #818cf8; margin-bottom: 16px; }
.stat-preview { display: flex; gap: 16px; margin-bottom: 0; }
.sp-item { flex: 1; text-align: center; padding: 12px; border-radius: 10px; }
.sp-reform { background: rgba(20,20,40,0.8); border: 1px solid rgba(129,140,248,0.3); backdrop-filter: blur(8px); }
.sp-labour { background: rgba(20,20,20,0.72); border: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(8px); }
.sp-pct { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; }
.sp-label { font-size: 11px; color: #666; margin-top: 2px; }
.bottom-bar {
  padding: 14px 24px; display: flex; justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,0.06);
  background: rgba(10,10,10,0.5);
}
.brand { font-size: 11px; color: #666; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="top-bar">
  <span class="eyebrow">Reino Unido · Elecciones</span>
  <span class="slide-num">01 — 04</span>
</div>
<div class="content">
  <div class="live-badge">
    <div class="live-dot"></div>
    <span class="live-text">🗳️ Urnas cerradas</span>
  </div>
  <div class="headline-big">Recuento en marcha.<br><span>Reform lidera.</span></div>
  <div class="sub-line">Resultados definitivos el viernes</div>
  <div class="divider"></div>
  <div class="stat-preview">
    <div class="sp-item sp-reform">
      <div class="sp-pct" style="color:#818cf8">25%</div>
      <div class="sp-label">Reform UK<br>(YouGov)</div>
    </div>
    <div class="sp-item sp-labour">
      <div class="sp-pct" style="color:#f87171">18%</div>
      <div class="sp-label">Laboristas<br>(YouGov)</div>
    </div>
    <div class="sp-item sp-labour">
      <div class="sp-pct" style="color:#888">17%</div>
      <div class="sp-label">Conservadores<br>(YouGov)</div>
    </div>
  </div>
</div>
<div class="bottom-bar">
  <span class="brand">horadedespertar.org</span>
  <span style="font-size:11px;color:#666;">07·05·26</span>
</div>
</body>
</html>
