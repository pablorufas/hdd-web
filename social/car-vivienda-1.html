<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 540px; height: 720px; overflow: hidden;
  background: #0a0a0a; color: #f5f0e8;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex; flex-direction: column;
}
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px 0;
}
.eyebrow { font-size: 11px; letter-spacing: 0.12em; color: #888; text-transform: uppercase; }
.slide-num { font-size: 11px; color: #555; }
.content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 28px; }
.big-stat { font-size: 112px; font-weight: 800; line-height: 1; letter-spacing: -0.05em; color: #c8211e; }
.stat-unit { font-size: 16px; color: #aaa; margin-top: 6px; font-weight: 500; letter-spacing: 0.02em; }
.divider { width: 48px; height: 3px; background: #c8211e; margin: 18px 0; }
.headline { font-size: 24px; font-weight: 700; line-height: 1.3; color: #f5f0e8; max-width: 440px; }
.context-row {
  display: flex; gap: 10px; margin-top: 16px;
}
.pill {
  font-size: 12px; color: #888; background: #141414;
  padding: 6px 12px; border-radius: 20px;
}
.pill.hot { color: #c8211e; background: #1a0808; }
.bottom-bar {
  padding: 16px 24px; display: flex; justify-content: space-between;
  border-top: 1px solid #1e1e1e;
}
.brand { font-size: 11px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="top-bar">
  <span class="eyebrow">Vivienda · España</span>
  <span class="slide-num">01 — 04</span>
</div>
<div class="content">
  <div class="big-stat">141</div>
  <div class="stat-unit">personas por cada piso disponible en alquiler</div>
  <div class="divider"></div>
  <div class="headline">El alquiler bate récords. Los jóvenes se hacinan.</div>
  <div class="context-row">
    <div class="pill hot">15€/m² — máximo histórico</div>
    <div class="pill">28 capitales</div>
    <div class="pill">+22% hacinamiento</div>
  </div>
</div>
<div class="bottom-bar">
  <span class="brand">horadedespertar.org</span>
  <span style="font-size:11px;color:#555;">06·05·26</span>
</div>
</body>
</html>
