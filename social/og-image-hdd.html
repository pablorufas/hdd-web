<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #0a0a0a; color: #f5f0e8;
  font-family: system-ui, -apple-system, sans-serif;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
/* Subtle grid texture */
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(200,33,30,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,33,30,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
/* Red glow top-left */
.glow {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,33,30,0.18) 0%, transparent 70%);
  top: -200px; left: -100px;
}
.content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 0 80px;
}
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(200,33,30,0.12); border: 1px solid rgba(200,33,30,0.35);
  border-radius: 100px; padding: 8px 20px; margin-bottom: 32px;
}
.pill-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8211e; }
.pill-text { font-size: 13px; color: #c8211e; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; }
.brand {
  font-size: 88px; font-weight: 900; letter-spacing: -0.04em;
  color: #f5f0e8; line-height: 1;
  margin-bottom: 16px;
}
.brand span { color: #c8211e; }
.tagline {
  font-size: 22px; color: rgba(245,240,232,0.5);
  letter-spacing: 0.06em; text-transform: uppercase;
  font-weight: 400;
}
.url {
  position: absolute; bottom: 32px; right: 48px;
  font-size: 14px; color: rgba(245,240,232,0.25);
  letter-spacing: 0.08em; text-transform: uppercase;
}
/* Bottom border accent */
.bottom-line {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: #c8211e;
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>
<div class="content">
  <div class="pill">
    <div class="pill-dot"></div>
    <span class="pill-text">Periodismo explicado</span>
  </div>
  <div class="brand">H<span>d</span>D</div>
  <div class="tagline">Hora de Despertar</div>
</div>
<div class="url">horadedespertar.org</div>
<div class="bottom-line"></div>
</body>
</html>
