<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
<style>
:root{--bg:#0a0a0a;--ink:#f5f0e8;--red:#c8211e;--muted:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:540px;height:960px;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif;color:var(--ink);}
.card{width:540px;height:960px;display:flex;flex-direction:column;padding:40px 44px;position:relative;}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto;}
.brand{font-size:20px;font-weight:800;color:var(--red);letter-spacing:.04em;}
.slide-ind{font-size:13px;color:var(--muted);letter-spacing:.1em;}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;gap:0;}
.eyebrow{font-size:13px;color:var(--red);text-transform:uppercase;letter-spacing:.18em;font-weight:600;margin-bottom:24px;}
.big-stat{font-size:128px;font-weight:900;line-height:.85;color:var(--red);letter-spacing:-.04em;margin-bottom:16px;}
.big-stat span{font-size:56px;}
.headline{font-size:34px;font-weight:800;line-height:1.12;letter-spacing:-.01em;margin-bottom:20px;}
.sub{font-size:17px;color:var(--muted);line-height:1.5;margin-bottom:0;}
.divider{height:1px;background:rgba(255,255,255,.09);margin:32px 0;}
.bottom{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:32px;}
.url{font-size:13px;color:var(--muted);letter-spacing:.04em;}
.swipe{font-size:14px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;}
.badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;padding:5px 12px;border-radius:2px;text-transform:uppercase;}
</style></head><body>
<div class="card">
  <div class="top">
    <span class="brand">HdD</span>
    <span class="slide-ind">1 / 4</span>
  </div>

  <div class="hero">
    <div class="badge">Internacional · Salud</div>
    <div style="height:32px;"></div>
    <div class="big-stat">3<span>muertos</span></div>
    <div class="headline">El crucero del hantavirus<br>llega hoy a España</div>
    <div class="divider"></div>
    <div class="sub">La OMS confirma la cepa Andes: la única de las <strong style="color:var(--ink);">38 cepas conocidas</strong> que se transmite de persona a persona.</div>
  </div>

  <div class="bottom">
    <span class="url">horadedespertar.org</span>
    <span class="swipe">Desliza &nbsp;→</span>
  </div>
</div>
</body></html>
