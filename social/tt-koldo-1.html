<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
<style>
:root{--bg:#0a0a0a;--ink:#f5f0e8;--red:#c8211e;--muted:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:540px;height:960px;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif;color:var(--ink);}
.card{width:540px;height:960px;display:flex;flex-direction:column;padding:40px 44px;position:relative;}
.top{display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:20px;font-weight:800;color:var(--red);}
.slide-ind{font-size:13px;color:var(--muted);letter-spacing:.1em;}
.badge{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;padding:5px 12px;border-radius:2px;text-transform:uppercase;margin-top:36px;}
.big-num{font-size:160px;font-weight:900;color:var(--red);line-height:.85;letter-spacing:-.06em;margin:24px 0 0;}
.big-label{font-size:28px;font-weight:800;color:var(--muted);margin-bottom:8px;}
.headline{font-size:28px;font-weight:800;line-height:1.15;letter-spacing:-.01em;margin:20px 0 16px;}
.divider{height:1px;background:rgba(255,255,255,.09);margin:20px 0;}
.sub{font-size:16px;color:var(--muted);line-height:1.5;}
.sub strong{color:var(--ink);}
.bottom{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:28px;}
.url{font-size:13px;color:var(--muted);}
.swipe{font-size:14px;font-weight:600;}
</style></head><body>
<div class="card">
  <div class="top">
    <span class="brand">HdD</span>
    <span class="slide-ind">1 / 4</span>
  </div>

  <div class="badge">Política · Justicia</div>
  <div class="big-num">24</div>
  <div class="big-label">años de prisión</div>

  <div class="divider"></div>

  <div class="headline">Lo que pide la Fiscalía<br>para Ábalos. El juicio<br>más grande del año<br><span style="color:var(--red);">entra en recta final.</span></div>

  <div class="sub">14 sesiones en el Supremo. Hoy: informes finales. <strong>Tres versiones contradictorias</strong> de los mismos hechos.</div>

  <div class="bottom">
    <span class="url">horadedespertar.org</span>
    <span class="swipe">Desliza →</span>
  </div>
</div>
</body></html>
